name: CI — Lint, Test & Upload

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  lint-and-test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  upload:
    name: Deploy (devvit upload)
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Skip on pull_request — forks do not have access to secrets
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Upload to Devvit
        run: npm run upload
        env:
          DEVVIT_AUTH_TOKEN: ${{ secrets.DEVVIT_TOKEN }}
